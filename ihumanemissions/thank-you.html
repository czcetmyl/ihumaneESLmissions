<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You | International Humanitarian Missions</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a3d2e 0%, #1a5c38 50%, #0d4f7c 100%);
      margin: 0;
      padding: 24px;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      text-align: center;
    }
    .ty-card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 56px 48px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    .ty-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }
    .ty-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      color: #0a3d2e;
      margin: 0 0 16px;
      line-height: 1.2;
    }
    .ty-msg {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.8;
      margin: 0 0 12px;
    }
    .ty-org {
      font-size: 0.9rem;
      color: #1a5c38;
      font-weight: 600;
      margin: 0 0 36px;
      font-style: italic;
    }
    .ty-btn {
      display: inline-block;
      background: linear-gradient(135deg, #1a5c38, #2d9b68);
      color: #fff;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      box-shadow: 0 6px 20px rgba(26,92,56,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .ty-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(26,92,56,0.45);
    }
    .ty-divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #1a5c38, #2d9b68);
      border-radius: 2px;
      margin: 0 auto 28px;
    }
    @media (max-width: 480px) {
      .ty-card { padding: 40px 28px 36px; }
    }
  </style>
</head>
<body>
  <div class="ty-card">
    <span class="ty-icon">🌿</span>
    <h1 class="ty-title">Thank you for reaching out!</h1>
    <div class="ty-divider"></div>
    <p class="ty-msg">We have received your message and will get back to you as soon as possible. Your support means the world to the children of Tonlé Sap.</p>
    <p class="ty-org">— International Humanitarian Missions</p>
    <a href="index.html" class="ty-btn">&#8592; Back to Home</a>
  </div>
</body>
</html>
