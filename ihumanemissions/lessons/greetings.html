<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greetings Lesson — IHM English</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#f59e0b,#fbbf24,#fcd34d);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;}
    .header{text-align:center;color:#78350f;margin-bottom:28px;}
    .header small{font-size:0.8rem;opacity:0.7;letter-spacing:0.1em;text-transform:uppercase;}
    .header h1{font-size:1.6rem;font-weight:900;margin:4px 0;}
    .card{background:#fff;border-radius:24px;padding:36px 28px;max-width:520px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
    .progress{font-size:0.82rem;color:#aaa;font-weight:700;margin-bottom:16px;}
    /* Flip card */
    .flip-scene{width:340px;height:200px;perspective:800px;margin:0 auto 20px;cursor:pointer;}
    .flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s;}
    .flip-card.flipped{transform:rotateY(180deg);}
    .flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;}
    .flip-front{background:linear-gradient(135deg,#fef3cd,#fde68a);border:3px solid #fbbf24;}
    .flip-back{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:3px solid #34d399;transform:rotateY(180deg);}
    .flip-emoji{font-size:2.4rem;}
    .flip-phrase{font-size:1.6rem;font-weight:900;color:#b45309;}
    .flip-hint{font-size:0.82rem;color:#92400e;font-weight:700;opacity:0.7;}
    .flip-pron{font-size:1.1rem;font-weight:800;color:#047857;font-style:italic;}
    .flip-meaning{font-size:0.95rem;color:#065f46;font-weight:700;}
    .flip-tap{font-size:0.78rem;color:#aaa;margin-bottom:12px;}
    .nav{display:flex;gap:14px;justify-content:center;}
    .btn{padding:12px 28px;border:none;border-radius:50px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s;}
    .btn-prev{background:#fef3cd;color:#b45309;}
    .btn-next{background:#f59e0b;color:#fff;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.15);}
    .dot-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
    .dot{width:10px;height:10px;border-radius:50%;background:#fde68a;transition:background 0.3s;}
    .dot.done{background:#f59e0b;}
    .dot.current{background:#b45309;transform:scale(1.4);}
    /* Practice section */
    .practice{margin-top:24px;border-top:2px dashed #fde68a;padding-top:20px;}
    .practice-label{font-size:0.95rem;font-weight:800;color:#555;margin-bottom:10px;}
    .practice-input{width:100%;padding:14px;font-size:1.1rem;font-weight:800;text-align:center;border:3px solid #fde68a;border-radius:12px;font-family:inherit;outline:none;}
    .practice-input:focus{border-color:#f59e0b;}
    .practice-feedback{font-size:1rem;font-weight:800;margin-top:8px;min-height:28px;}
    .correct{color:#059669;}
    .wrong{color:#e53e3e;}
    /* Confetti */
    .confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;}
    .confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:fall linear forwards;}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
  </style>
</head>
<body>
<div class="confetti-container" id="confettiContainer"></div>
<div class="header">
  <small>🌍 International Humanitarian Missions — English Program</small>
  <h1>Greetings &amp; Hello!</h1>
</div>

<div class="card">
  <div class="progress" id="progress">Phrase 1 of 10</div>
  <div class="flip-tap">👆 Tap the card to flip it!</div>

  <div class="flip-scene" onclick="flipCard()">
    <div class="flip-card" id="flipCard">
      <div class="flip-front">
        <div class="flip-emoji" id="cardEmoji">👋</div>
        <div class="flip-phrase" id="cardPhrase">Hello!</div>
        <div class="flip-hint">Tap to see pronunciation &amp; meaning →</div>
      </div>
      <div class="flip-back">
        <div class="flip-pron" id="cardPron">"heh-LOH"</div>
        <div class="flip-meaning" id="cardMeaning">A friendly way to say hi to someone</div>
      </div>
    </div>
  </div>

  <div class="dot-row" id="dotRow"></div>

  <div class="nav">
    <button class="btn btn-prev" onclick="prev()">← Prev</button>
    <button class="btn btn-next" onclick="next()">Next →</button>
  </div>

  <div class="practice" id="practiceSection">
    <div class="practice-label" id="practiceLabel">Your turn! Type: <strong id="practiceTarget"></strong></div>
    <input class="practice-input" id="practiceInput" placeholder="Type the greeting here..." oninput="checkPractice()"/>
    <div class="practice-feedback" id="practiceFeedback"></div>
  </div>
</div>

<script>
const phrases = [
  {e:'👋',p:'Hello!',pron:'"heh-LOH"',m:'A friendly way to say hi to someone'},
  {e:'🌅',p:'Good morning!',pron:'"good MOR-ning"',m:'Said when you see someone in the morning'},
  {e:'☀️',p:'Good afternoon!',pron:'"good af-ter-NOON"',m:'Said from noon until about 5 PM'},
  {e:'🌙',p:'Good evening!',pron:'"good EEV-ning"',m:'Said when the sun is going down'},
  {e:'👐',p:'Goodbye!',pron:'"good-BYE"',m:'What you say when you leave someone'},
  {e:'🙏',p:'Thank you!',pron:'"THANK yoo"',m:'Said when someone does something nice for you'},
  {e:'💛',p:'Please',pron:'"PLEEZ"',m:'A polite word to use when asking for something'},
  {e:'😊',p:"You're welcome!",pron:'"yor WEL-kum"',m:'What you say after someone thanks you'},
  {e:'❓',p:'How are you?',pron:'"how ar YOO"',m:'A question to ask how someone is feeling'},
  {e:'😄',p:'I am fine, thank you!',pron:'"I am FINE, THANK yoo"',m:'A happy answer to "How are you?"'}
];
let current=0, isFlipped=false;

function buildDots(){
  const row=document.getElementById('dotRow'); row.innerHTML='';
  phrases.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===current?' current':i<current?' done':'');row.appendChild(d);});
}
function show(){
  const ph=phrases[current];
  isFlipped=false;
  document.getElementById('flipCard').classList.remove('flipped');
  document.getElementById('cardEmoji').textContent=ph.e;
  document.getElementById('cardPhrase').textContent=ph.p;
  document.getElementById('cardPron').textContent=ph.pron;
  document.getElementById('cardMeaning').textContent=ph.m;
  document.getElementById('progress').textContent=`Phrase ${current+1} of 10`;
  document.getElementById('practiceTarget').textContent=ph.p;
  document.getElementById('practiceInput').value='';
  document.getElementById('practiceFeedback').textContent='';
  buildDots();
}
function flipCard(){ isFlipped=!isFlipped; document.getElementById('flipCard').classList.toggle('flipped',isFlipped); }
function next(){ if(current<phrases.length-1){current++;show();} }
function prev(){ if(current>0){current--;show();} }

function checkPractice(){
  const val=document.getElementById('practiceInput').value.trim();
  const target=phrases[current].p.replace(/[!?,]/g,'').toLowerCase();
  const typed=val.replace(/[!?,]/g,'').toLowerCase();
  if(typed===target){
    document.getElementById('practiceFeedback').textContent='🎉 Perfect! Amazing job!';
    document.getElementById('practiceFeedback').className='practice-feedback correct';
    launchConfetti();
  } else if(val.length>=target.length){
    document.getElementById('practiceFeedback').textContent=`Keep trying! Type: "${phrases[current].p}"`;
    document.getElementById('practiceFeedback').className='practice-feedback wrong';
  } else {
    document.getElementById('practiceFeedback').textContent='';
  }
}

function launchConfetti(){
  const container=document.getElementById('confettiContainer');
  const colors=['#f59e0b','#1b7a4a','#3b82f6','#e53e3e','#a855f7','#34d399'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.4}s;`;
    container.appendChild(p);
    setTimeout(()=>p.remove(),2500);
  }
}
show();
</script>
</body>
</html>
