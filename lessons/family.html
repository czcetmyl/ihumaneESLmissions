<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Lesson — IHM English</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a7ab5,#38bdf8,#7dd3fc);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;}
    .header{text-align:center;color:#fff;margin-bottom:24px;}
    .header small{font-size:0.8rem;opacity:0.8;letter-spacing:0.1em;text-transform:uppercase;}
    .header h1{font-size:1.6rem;font-weight:900;margin:4px 0;}
    .card{background:#fff;border-radius:24px;padding:36px 28px;max-width:540px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.2);}
    /* Learn phase */
    .learn-phase{}
    .progress{font-size:0.82rem;color:#aaa;font-weight:700;margin-bottom:14px;}
    .member-circle{width:130px;height:130px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:4rem;border:5px solid rgba(255,255,255,0.8);box-shadow:0 8px 28px rgba(0,0,0,0.15);animation:popIn 0.5s ease;}
    @keyframes popIn{from{transform:scale(0.3);opacity:0;}60%{transform:scale(1.12);}to{transform:scale(1);opacity:1;}}
    .member-name{font-size:2rem;font-weight:900;color:#1a7ab5;margin-bottom:4px;}
    .member-sentence{font-size:1rem;color:#555;margin-bottom:6px;line-height:1.6;}
    .member-fun{font-size:0.88rem;color:#888;font-style:italic;margin-bottom:18px;}
    .btn{padding:12px 26px;border:none;border-radius:50px;font-size:0.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.15);}
    .btn-prev{background:#e0f2fe;color:#1a7ab5;}
    .btn-next{background:#1a7ab5;color:#fff;}
    .nav{display:flex;gap:14px;justify-content:center;}
    .dot-row{display:flex;gap:6px;justify-content:center;margin:14px 0;}
    .dot{width:10px;height:10px;border-radius:50%;background:#bae6fd;transition:background 0.3s;}
    .dot.done{background:#1a7ab5;}
    .dot.current{background:#f59e0b;transform:scale(1.4);}
    /* Practice phase */
    .practice-phase{display:none;}
    .practice-title{font-size:1.1rem;font-weight:900;color:#1a7ab5;margin-bottom:18px;}
    .word-bank{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
    .word-chip{background:#e0f2fe;color:#1a7ab5;padding:6px 16px;border-radius:50px;font-weight:800;font-size:0.92rem;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
    .word-chip:hover{border-color:#1a7ab5;}
    .word-chip.used{opacity:0.35;cursor:default;}
    .fill-sentences{text-align:left;}
    .fill-row{background:#f0f9ff;border:2px solid #bae6fd;border-radius:10px;padding:14px 18px;margin-bottom:12px;font-size:1rem;line-height:2;}
    .fill-blank{display:inline-block;border-bottom:3px solid #1a7ab5;min-width:110px;text-align:center;color:#1a7ab5;font-weight:900;font-size:1rem;vertical-align:bottom;cursor:pointer;}
    .fill-blank.filled{background:#d0f0ff;border-radius:6px;padding:0 6px;}
    .check-btn{margin-top:18px;background:linear-gradient(135deg,#1a7ab5,#38bdf8);color:#fff;width:100%;padding:14px;font-size:1rem;border-radius:12px;border:none;font-weight:800;cursor:pointer;font-family:inherit;}
    .check-btn:hover{transform:translateY(-2px);}
    .result{font-size:1.1rem;font-weight:800;margin-top:14px;min-height:32px;}
    .celebrate{font-size:1.4rem;animation:bounce 0.6s ease infinite alternate;}
    @keyframes bounce{from{transform:scale(1);}to{transform:scale(1.2);}}
    /* Confetti */
    .confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;}
    .confetti-piece{position:absolute;top:-10px;animation:fall linear forwards;}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
    .start-practice-btn{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;width:100%;margin-top:16px;font-size:1rem;padding:14px;border:none;border-radius:50px;font-weight:800;cursor:pointer;font-family:inherit;display:none;}
    .start-practice-btn:hover{transform:translateY(-2px);}
  </style>
</head>
<body>
<div class="confetti-container" id="confettiContainer"></div>
<div class="header">
  <small>🌍 International Humanitarian Missions — English Program</small>
  <h1>My Family 👨‍👩‍👧‍👦</h1>
</div>

<div class="card">
  <!-- Learn Phase -->
  <div class="learn-phase" id="learnPhase">
    <div class="progress" id="learnProgress">Member 1 of 6</div>
    <div class="member-circle" id="memberCircle"></div>
    <div class="member-name" id="memberName">Mother</div>
    <div class="member-sentence" id="memberSentence">"This is my <strong>mother</strong>. She takes care of our family."</div>
    <div class="member-fun" id="memberFun">In English, we also say "Mom" or "Mum" 💛</div>
    <div class="dot-row" id="dotRow"></div>
    <div class="nav">
      <button class="btn btn-prev" onclick="prevMember()">← Prev</button>
      <button class="btn btn-next" onclick="nextMember()" id="learnNext">Next →</button>
    </div>
    <button class="start-practice-btn" id="startPracticeBtn" onclick="showPractice()">✏️ Practice Fill-in-the-Blank!</button>
  </div>

  <!-- Practice Phase -->
  <div class="practice-phase" id="practicePhase">
    <div class="practice-title">👨‍👩‍👧 Fill in the Blanks!</div>
    <div style="font-size:0.85rem;color:#888;margin-bottom:12px;">Click a word from the Word Bank, then click a blank to fill it in.</div>
    <div class="word-bank" id="wordBank"></div>
    <div class="fill-sentences" id="fillSentences"></div>
    <button class="check-btn" onclick="checkAnswers()">✅ Check My Answers!</button>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
const members=[
  {e:'👩',color:'#f9a8d4',name:'Mother',sent:'This is my <strong>mother</strong>. She takes care of our family.',fun:'In English, we also say "Mom" or "Mum" 💛'},
  {e:'👨',color:'#6ee7b7',name:'Father',sent:'This is my <strong>father</strong>. He works hard for our family.',fun:'In English, we also say "Dad" or "Papa" 💚'},
  {e:'👧',color:'#fde68a',name:'Sister',sent:'This is my <strong>sister</strong>. We play together every day.',fun:'A sister is a girl in your family 💛'},
  {e:'👦',color:'#93c5fd',name:'Brother',sent:'This is my <strong>brother</strong>. He is my best friend.',fun:'A brother is a boy in your family 💙'},
  {e:'👵',color:'#d9f99d',name:'Grandmother',sent:'This is my <strong>grandmother</strong>. She tells us wonderful stories.',fun:'In English, we also say "Grandma" or "Nana" 💚'},
  {e:'👴',color:'#c4b5fd',name:'Grandfather',sent:'This is my <strong>grandfather</strong>. He is very wise and kind.',fun:'In English, we also say "Grandpa" or "Pops" 💜'}
];
let learnIdx=0;

function buildDots(){
  const row=document.getElementById('dotRow');row.innerHTML='';
  members.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===learnIdx?' current':i<learnIdx?' done':'');row.appendChild(d);});
}
function showMember(){
  const m=members[learnIdx];
  const circle=document.getElementById('memberCircle');
  circle.style.background=m.color;
  circle.style.animation='none'; void circle.offsetWidth; circle.style.animation='popIn 0.5s ease';
  circle.textContent=m.e;
  document.getElementById('memberName').textContent=m.name;
  document.getElementById('memberSentence').innerHTML='"'+m.sent+'"';
  document.getElementById('memberFun').textContent=m.fun;
  document.getElementById('learnProgress').textContent=`Member ${learnIdx+1} of 6`;
  document.getElementById('learnNext').textContent=learnIdx===5?'🎉 All done!':'Next →';
  document.getElementById('startPracticeBtn').style.display=learnIdx===5?'block':'none';
  buildDots();
}
function nextMember(){if(learnIdx<5){learnIdx++;showMember();}}
function prevMember(){if(learnIdx>0){learnIdx--;showMember();}}

const sentences=[
  {text:'This is my ___. She is my best friend.',answer:'Sister'},
  {text:'My ___ goes to work every morning.',answer:'Father'},
  {text:'My ___ cooks delicious food for us.',answer:'Mother'},
  {text:'My ___ and I play football after school.',answer:'Brother'},
  {text:'My ___ tells us stories about the past.',answer:'Grandfather'},
  {text:'My ___ gives the best hugs in the world!',answer:'Grandmother'}
];
let selected=null, filled={};

function showPractice(){
  document.getElementById('learnPhase').style.display='none';
  document.getElementById('practicePhase').style.display='block';
  // Build word bank
  const bank=document.getElementById('wordBank'); bank.innerHTML='';
  members.forEach(m=>{
    const chip=document.createElement('div');
    chip.className='word-chip'; chip.textContent=m.name; chip.dataset.word=m.name;
    chip.onclick=()=>{
      if(chip.classList.contains('used'))return;
      document.querySelectorAll('.word-chip').forEach(c=>c.style.borderColor='transparent');
      chip.style.borderColor='#1a7ab5';
      selected=m.name;
    };
    bank.appendChild(chip);
  });
  // Build sentences
  const sDiv=document.getElementById('fillSentences'); sDiv.innerHTML='';
  sentences.forEach((s,i)=>{
    const row=document.createElement('div'); row.className='fill-row';
    const parts=s.text.split('___');
    row.innerHTML=parts[0];
    const blank=document.createElement('span');
    blank.className='fill-blank'; blank.textContent='______'; blank.dataset.idx=i;
    blank.onclick=()=>{
      if(!selected)return;
      blank.textContent=selected; blank.classList.add('filled');
      filled[i]=selected;
      // mark chip used
      document.querySelectorAll('.word-chip').forEach(c=>{if(c.dataset.word===selected){c.classList.add('used');c.style.borderColor='transparent';}});
      selected=null;
    };
    row.appendChild(blank);
    row.innerHTML+=parts[1];
    sDiv.appendChild(row);
  });
}

function checkAnswers(){
  let correct=0;
  sentences.forEach((s,i)=>{
    const blank=document.querySelector(`.fill-blank[data-idx="${i}"]`);
    if(filled[i]===s.answer){correct++;blank.style.background='#d1fae5';blank.style.color='#047857';}
    else{blank.style.background='#fee2e2';blank.style.color='#b91c1c';blank.textContent=s.answer;}
  });
  const res=document.getElementById('result');
  if(correct===sentences.length){
    res.innerHTML='<span class="celebrate">🎉🎊 Perfect! All correct! You know your family words!</span>';
    launchConfetti();
  } else {
    res.innerHTML=`You got <strong>${correct} of ${sentences.length}</strong> correct! Check the red ones and try again. 💪`;
    res.style.color='#1a7ab5';
  }
}

function launchConfetti(){
  const container=document.getElementById('confettiContainer');
  const colors=['#1a7ab5','#f59e0b','#22c55e','#e53e3e','#a855f7','#38bdf8'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.2+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;`;
    container.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}
showMember();
</script>
</body>
</html>
